name: Deploy GitHub Pages

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'integrations/**'
      - 'healthbridge/products/specialty-forms/frontend/**'
      - 'healthbridge/products/flowclinic/kiosk/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static assets
        run: |
          # Ensure .nojekyll exists to skip Jekyll processing
          touch docs/.nojekyll

          # Copy integrations into docs for GitHub Pages publishing
          mkdir -p docs/integrations
          cp -r integrations/* docs/integrations/

          # Copy FlowClinic kiosk into docs for live demo
          mkdir -p docs/healthbridge/demos/flowclinic-kiosk
          cp -r healthbridge/products/flowclinic/kiosk/* docs/healthbridge/demos/flowclinic-kiosk/

          # Copy Specialty Forms dental chart into docs for live demo
          mkdir -p docs/healthbridge/demos/dental-chart
          cp -r healthbridge/products/specialty-forms/frontend/* docs/healthbridge/demos/dental-chart/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
