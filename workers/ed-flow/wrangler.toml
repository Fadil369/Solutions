name = "healthbridge-ed-flow"
main = "src/index.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSION_KV"
id = "ED_SESSION_KV_ID_PRODUCTION"
preview_id = "ED_SESSION_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "METRICS_KV"
id = "ED_METRICS_KV_ID_PRODUCTION"
preview_id = "ED_METRICS_KV_PREVIEW_ID"

[vars]
ENVIRONMENT = "production"
BACKEND_URL = "https://ED_FLOW_BACKEND_HOST"
N8N_WEBHOOK_URL = "https://ED_FLOW_N8N_WEBHOOK_HOST"
ALLOWED_ORIGINS = "https://ED_FLOW_ALLOWED_ORIGIN"
DEFAULT_HOSPITAL_CODE = "NGHA"
